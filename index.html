<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Final Grade Calculator</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- Ambient orbs -->
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>

  <header class="site-header">
    <div class="header-icon">
      <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c0 2 4 3 6 3s6-1 6-3v-5"/></svg>
    </div>
    <h1>Final Grade Calculator</h1>
    <p>Track assignments, weights, and your current course grade.</p>
  </header>

  <main class="container">
    <section class="glass-card">
      <h2><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon-primary"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg> Add Assignment</h2>
      <form id="grade-form" class="grade-form">
        <div class="form-group">
          <label for="assignment-name">Assignment Name</label>
          <input type="text" id="assignment-name" placeholder="Quiz 1" required />
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="earned">Points Earned</label>
            <input type="number" id="earned" min="0" step="0.01" placeholder="85" required />
          </div>
          <div class="form-group">
            <label for="possible">Points Possible</label>
            <input type="number" id="possible" min="0.01" step="0.01" placeholder="100" required />
          </div>
        </div>
        <div class="form-group">
          <label for="weight">Weight (%)</label>
          <input type="number" id="weight" min="0" max="100" step="0.01" placeholder="20" required />
        </div>
        <div class="button-row">
          <button type="submit" class="btn primary">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            Add Assignment
          </button>
          <button type="button" id="reset-btn" class="btn secondary">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
            Reset All
          </button>
        </div>
      </form>
      <p id="message" class="message"></p>
    </section>

    <section class="glass-card">
      <h2>Grade Summary</h2>
      <div class="summary-grid">
        <div class="summary-box glow-primary">
          <span class="summary-label">Current Grade</span>
          <span id="current-grade" class="summary-value">0.00%</span>
        </div>
        <div class="summary-box">
          <span class="summary-label">Weights Entered</span>
          <span id="weight-total" class="summary-value">0.00%</span>
        </div>
        <div class="summary-box glow-accent">
          <span class="summary-label">Remaining Weight</span>
          <span id="remaining-weight" class="summary-value accent-text">100.00%</span>
        </div>
      </div>
    </section>

    <section class="glass-card">
      <h2>Assignments</h2>
      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>Name</th>
              <th>Score</th>
              <th>Weight</th>
              <th>Percent</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody id="assignment-list">
            <tr id="empty-row">
              <td colspan="5" class="empty-state">No assignments added yet.</td>
            </tr>
          </tbody>
        </table>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
